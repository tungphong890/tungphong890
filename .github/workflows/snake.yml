name: Generate Snake

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=%23FF6FA5&color_dots=%23FFE5EC,%23FFC2D1,%23FFB3C6,%23FF8FAB,%23FF6FA5
            dist/snake-dark.svg?palette=github-dark&color_snake=%23FF8FAB&color_dots=%232D1B24,%23FFC2D1,%23FFB3C6,%23FF8FAB,%23FF6FA5

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
