name: Generate Snake

on:
  schedule:
    # Chạy lại mỗi 12 giờ để cập nhật đường đi của rắn theo contribution
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=FF6FA5&color_dots=FFE5EC,FFC2D1,FFB3C6,FF8FAB,FF6FA5
            dist/snake-dark.svg?palette=github-dark&color_snake=FF8FAB&color_dots=2d1b24,FFC2D1,FFB3C6,FF8FAB,FF6FA5

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
