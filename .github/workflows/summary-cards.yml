name: Generate Profile Summary Cards

on:
  schedule:
    # Refresh twice a day
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

# Serialize with other workflows that push to main (prevents push races)
concurrency:
  group: profile-main-assets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary cards (no internal push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7
          AUTO_PUSH: false

      - name: List generated files (debug)
        run: |
          echo "=== git status ==="
          git status --porcelain
          echo "=== find svg ==="
          find . -name "*.svg" -newermt "-10 minutes" -not -path "./.git/*" | head -50

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile summary cards"
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
