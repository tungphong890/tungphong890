name: Generate Profile Summary Cards

on:
  schedule:
    # Refresh twice a day
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

# Serialize with other workflows that push to main (prevents push races)
concurrency:
  group: profile-main-assets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary cards (no internal push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7
          AUTO_PUSH: false

      - name: Capture output tree (debug)
        run: |
          {
            echo "PWD=$(pwd)"
            echo "=== git status --porcelain ==="
            git status --porcelain
            echo "=== all svg files (excluding .git) ==="
            find . -path ./.git -prune -o -name '*.svg' -print
            echo "=== top-level listing ==="
            ls -la
          } > _debug_tree.txt 2>&1 || true

      - name: Commit generated cards + debug
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile summary cards"
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
